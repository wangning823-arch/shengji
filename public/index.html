<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>打升级 - 联机拖拉机</title>
  <link rel="stylesheet" href="style.css">
  <script src="https://download.agora.io/sdk/release/AgoraRTC_N-4.20.0.js"></script>
</head>
<body>
  <div id="app">
    <!-- 登录页 -->
    <div id="login-screen" class="screen active">
      <div class="login-box">
        <h1>打升级</h1>
        <p class="subtitle">4人联机拖拉机 / 80分</p>
        <div class="login-form">
          <input id="nickname-input" type="text" placeholder="输入昵称（选填）" maxlength="12">
          <div class="login-buttons">
            <button id="btn-guest" class="btn primary">游客登录</button>
            <button id="btn-wechat" class="btn wechat">微信登录</button>
          </div>
        </div>
        <p class="tip">推荐横屏游玩，体验更佳</p>
      </div>
    </div>

    <!-- 大厅 -->
    <div id="lobby-screen" class="screen">
      <div class="lobby-header">
        <div class="user-info">
          <div id="user-avatar" class="avatar-placeholder"></div>
          <span id="user-nickname">游客</span>
          <button id="btn-logout" class="btn small">退出登录</button>
        </div>
        <h2>游戏大厅</h2>
      </div>
      <div class="lobby-actions">
        <button id="btn-create-room" class="btn primary">创建房间</button>
        <div class="join-box">
          <input id="room-code-input" type="text" placeholder="输入房间号" maxlength="6">
          <button id="btn-join-room" class="btn">加入房间</button>
        </div>
      </div>
      <div id="room-config-panel" class="panel hidden">
        <h3>创建房间</h3>
        <label>牌副数</label>
        <select id="deck-count">
          <option value="2">2副牌</option>
          <option value="3">3副牌</option>
          <option value="4">4副牌</option>
        </select>
        <div class="panel-actions">
          <button id="btn-cancel-create" class="btn">取消</button>
          <button id="btn-confirm-create" class="btn primary">创建</button>
        </div>
      </div>
      <div class="room-list-section">
        <h3>当前房间</h3>
        <div id="room-list" class="room-list">
          <p class="empty-hint">暂无等待中的房间</p>
        </div>
      </div>
    </div>

    <!-- 房间 -->
    <div id="room-screen" class="screen">
      <div class="room-header">
        <span id="room-id-display">房间号: ----</span>
        <button id="btn-leave-room" class="btn small">离开</button>
      </div>
      <div class="seats">
        <div class="seat" data-seat="0">
          <div class="seat-index">0</div>
          <div class="seat-avatar"></div>
          <div class="seat-name">空闲</div>
          <div class="seat-status"></div>
          <button class="btn small seat-action hidden" data-action="sit">坐下</button>
        </div>
        <div class="seat" data-seat="1">
          <div class="seat-index">1</div>
          <div class="seat-avatar"></div>
          <div class="seat-name">空闲</div>
          <div class="seat-status"></div>
          <button class="btn small seat-action hidden" data-action="sit">坐下</button>
        </div>
        <div class="seat" data-seat="2">
          <div class="seat-index">2</div>
          <div class="seat-avatar"></div>
          <div class="seat-name">空闲</div>
          <div class="seat-status"></div>
          <button class="btn small seat-action hidden" data-action="sit">坐下</button>
        </div>
        <div class="seat" data-seat="3">
          <div class="seat-index">3</div>
          <div class="seat-avatar"></div>
          <div class="seat-name">空闲</div>
          <div class="seat-status"></div>
          <button class="btn small seat-action hidden" data-action="sit">坐下</button>
        </div>
      </div>
      <div class="room-actions">
        <button id="btn-ready" class="btn primary hidden">准备</button>
        <button id="btn-add-ai" class="btn">添加AI玩家</button>
        <button id="btn-start" class="btn primary hidden">开始游戏</button>
      </div>
    </div>

    <!-- 牌桌 -->
    <div id="game-screen" class="screen">
      <div class="game-header">
        <div class="game-info">
          <span id="trump-info">主牌: ?</span>
          <span id="level-info">打: 2</span>
          <span id="score-info">得分: 0 - 0</span>
          <span id="bid-info"></span>
        </div>
        <button id="btn-game-menu" class="btn small">菜单</button>
        <button id="btn-rules" class="btn small">规则</button>
        <button id="btn-played-history" class="btn small">已出牌</button>
        <button id="btn-view-bottom" class="btn small hidden">底牌</button>
      </div>

      <div class="table">
        <!-- 队友（对家） -->
        <div class="player partner" data-seat="2">
          <div class="player-avatar"></div>
          <div class="player-name">--</div>
          <div class="player-cards-count">0张</div>
        </div>

        <!-- 上家 -->
        <div class="player left" data-seat="3">
          <div class="player-avatar"></div>
          <div class="player-name">--</div>
          <div class="player-cards-count">0张</div>
        </div>

        <!-- 下家 -->
        <div class="player right" data-seat="1">
          <div class="player-avatar"></div>
          <div class="player-name">--</div>
          <div class="player-cards-count">0张</div>
        </div>

        <!-- 出牌区 -->
        <div id="play-area">
          <div class="trick-seat trick-bottom" data-rel="0"></div>
          <div class="trick-seat trick-right" data-rel="1"></div>
          <div class="trick-seat trick-top" data-rel="2"></div>
          <div class="trick-seat trick-left" data-rel="3"></div>
          <div id="trick-winner"></div>
        </div>

        <!-- 底牌/分数 -->
        <div id="bottom-info"></div>
      </div>

      <!-- 自己的手牌 -->
      <div id="my-hand"></div>

      <!-- 操作按钮 -->
      <div id="game-actions">
        <button id="btn-bid" class="btn primary hidden">亮主</button>
        <button id="btn-confirm-trump" class="btn primary hidden">确认主牌</button>
        <button id="btn-set-bottom" class="btn primary hidden">扣底</button>
        <button id="btn-play" class="btn primary hidden">出牌</button>
        <button id="btn-pass" class="btn hidden">过</button>
        <button id="btn-sort" class="btn small">理牌</button>
      </div>

      <!-- 倒计时 -->
      <div id="timer" class="hidden">20</div>

      <!-- 聊天 -->
      <div id="chat-panel" class="hidden">
        <div id="chat-messages"></div>
        <div class="chat-input-area">
          <input id="chat-input" type="text" placeholder="按回车发送">
          <button id="btn-send-chat" class="btn small">发送</button>
        </div>
      </div>
      <button id="btn-toggle-chat" class="btn small">聊天</button>

      <!-- 语音 -->
      <div id="voice-controls">
        <button id="btn-mute" class="btn small">静音</button>
        <span id="voice-status">语音中</span>
      </div>
    </div>
  </div>

    <!-- 规则弹窗 -->
    <div id="rules-modal" class="modal hidden">
      <div class="modal-overlay"></div>
      <div class="modal-content">
        <div class="modal-header">
          <h2>游戏规则</h2>
          <button id="btn-close-rules" class="btn small">关闭</button>
        </div>
        <div class="modal-body" id="rules-body">
          <p>加载中...</p>
        </div>
      </div>
    </div>

    <!-- 已出牌弹窗 -->
    <div id="history-modal" class="modal hidden">
      <div class="modal-overlay"></div>
      <div class="modal-content">
        <div class="modal-header">
          <h2>已出牌记录</h2>
          <div>
            <button id="btn-toggle-history-view" class="btn small">切换: 轮次记录</button>
            <button id="btn-close-history" class="btn small">关闭</button>
          </div>
        </div>
        <div class="modal-body" id="history-body">
          <p>暂无记录</p>
        </div>
      </div>
    </div>

    <!-- 底牌弹窗 -->
    <div id="bottom-modal" class="modal hidden">
      <div class="modal-overlay"></div>
      <div class="modal-content">
        <div class="modal-header">
          <h2>本局底牌</h2>
          <button id="btn-close-bottom" class="btn small">关闭</button>
        </div>
        <div class="modal-body" id="bottom-body">
          <p>暂无底牌</p>
        </div>
      </div>
    </div>
  </div>

  <script src="agora-voice.js"></script>
  <script src="app.js"></script>
</body>
</html>
